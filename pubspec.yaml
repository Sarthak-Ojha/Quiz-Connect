name: quiz_app
description: A Flutter project for a quiz application

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.8.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0
  google_sign_in: ^7.1.1

  # Local Storage
  sqflite: ^2.4.0
  path: ^1.9.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.3

  # UI
  google_fonts: ^6.2.1

  # Notifications & Permissions
  flutter_local_notifications: ^19.4.0  # DOWNGRADED for compatibility
  permission_handler: ^12.0.1
  timezone: ^0.10.1                      # Keep current version
  vibration: ^3.1.3

  # Utilities
  intl: ^0.20.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png
    - assets/questions.json
    - assets/icon/icon.png

flutter_native_splash:
  color: "#1976D2"
  image: assets/splash_icon.png
  android_12:
    color: "#1976D2" 
    icon_background_color: "#1976D2"
  android: true
  web: false

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"  # Your icon file
  adaptive_icon_background: "#1976D2"  # Your app's color
  adaptive_icon_foreground: "assets/icon/icon.png"