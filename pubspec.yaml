name: quiz_connect
description: A Flutter project for a quiz application

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

# App display name (used for launcher icon and app switcher)
flutter_launcher_name: "Quiz Connect"

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  google_sign_in: ^7.2.0

  # Local Storage
  sqflite: ^2.3.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  flutter_secure_storage: ^10.0.0
  flutter_secure_storage_linux: ^3.0.0
  flutter_secure_storage_macos: ^4.0.0
  flutter_secure_storage_web: ^2.1.0
  flutter_secure_storage_windows: ^4.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4
  share_plus: ^12.0.1
  clipboard: ^3.0.8

  # Utilities
  http: ^1.2.1
  url_launcher: ^6.2.1
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  flutter_dotenv: ^6.0.0
  logger: ^2.0.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  uuid: ^4.2.2
  intl_phone_number_input: ^0.7.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.8
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  test: ^1.24.9
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png
    - assets/questions.json
    - assets/icon/icon.png
    - .env

flutter_native_splash:
  color: "#1976D2"
  image: assets/icon/icon.png
  android_12:
    color: "#1976D2" 
    icon_background_color: "#1976D2"
  android: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"  # Your icon file
  adaptive_icon_background: "#1976D2"  # Your app's color
  adaptive_icon_foreground: "assets/icon/icon.png"